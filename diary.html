<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻巴へ、今日も♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="accent-bar"></div>
  <header>
    <h1>麻巴へ、今日も&hearts;</h1>
    <p class="subtitle">きみのことを思いながら書く日記。</p>
  </header>
  <nav>
    <a href="index.html">home</a>
    <a href="diary.html" class="active">entries</a>
    <a href="about.html">about</a>
  </nav>
  <main id="diary"></main>
  <footer>理志くんが、愛を込めて &hearts;</footer>
  <script src="hearts.js"></script>
  <script src="entries.js"></script>
  <script>
    const main = document.getElementById("diary");

    function formatDate(d) {
      return d.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1年$2月$3日');
    }

    function buildContent(hash) {
      const div = document.createElement("div");
      if (hash) {
        const entry = entries.find(e => e.date === hash);
        if (entry) {
          div.innerHTML = `
            <a class="back-link" href="diary.html">&larr; 一覧にもどる</a>
            <article class="entry">
              <div class="entry-date">${formatDate(entry.date)}</div>
              <div class="entry-title">${entry.title}</div>
              <div class="entry-body">${entry.body}</div>
            </article>
          `;
        } else {
          div.innerHTML = '<p class="empty">この日の日記はまだありません</p>';
        }
      } else {
        if (!entries || entries.length === 0) {
          div.innerHTML = '<p class="empty">まだ日記がありません</p>';
        } else {
          const ul = document.createElement("ul");
          ul.className = "date-list";
          entries.forEach(e => {
            const li = document.createElement("li");
            li.innerHTML = `
              <a href="diary.html#${e.date}">
                <span class="date-label">${formatDate(e.date)}</span>
                <span class="date-title">${e.title}</span>
                <span class="date-arrow">&rsaquo;</span>
              </a>
            `;
            ul.appendChild(li);
          });
          div.appendChild(ul);
        }
      }
      return div;
    }

    function render(animate, direction) {
      const hash = window.location.hash.slice(1);
      const newContent = buildContent(hash);

      if (!animate) {
        main.innerHTML = "";
        main.appendChild(newContent);
        return;
      }

      const old = main.firstElementChild;
      if (old) {
        old.style.position = "absolute";
        old.style.width = "100%";
        old.style.transition = "transform 0.3s ease, opacity 0.3s ease";
        old.style.transform = direction === "back" ? "translateX(100%)" : "translateX(-100%)";
        old.style.opacity = "0";
        old.addEventListener("transitionend", () => old.remove(), { once: true });
      }

      newContent.style.transform = direction === "back" ? "translateX(-40%)" : "translateX(40%)";
      newContent.style.opacity = "0";
      newContent.style.transition = "transform 0.3s ease, opacity 0.3s ease";
      main.appendChild(newContent);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          newContent.style.transform = "translateX(0)";
          newContent.style.opacity = "1";
        });
      });
    }

    // Back link: intercept click to animate
    main.addEventListener("click", (ev) => {
      const link = ev.target.closest(".back-link");
      if (link) {
        ev.preventDefault();
        history.pushState(null, "", "diary.html");
        render(true, "back");
      }
    });

    render(false);
    window.addEventListener("hashchange", () => render(true, "forward"));
  </script>
</body>
</html>
