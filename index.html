<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻巴へ、今日も♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="accent-bar"></div>
  <header>
    <h1>麻巴へ、今日も&hearts;</h1>
    <p class="subtitle">きみのことを思いながら書く日記。</p>
  </header>
  <nav>
    <a href="index.html" class="active">home</a>
    <a href="diary.html">entries</a>
    <a href="about.html">about</a>
  </nav>
  <main id="latest"></main>
  <footer>理志くんが、愛を込めて &hearts;</footer>
  <script src="hearts.js"></script>
  <script src="entries.js"></script>
  <script>
    const main = document.getElementById("latest");
    if (!entries || entries.length === 0) {
      main.innerHTML = '<p class="empty">まだ日記がありません</p>';
    } else {
      const e = entries[0];
      main.innerHTML = `
        <article class="entry">
          <div class="entry-date">${e.date.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1年$2月$3日')}</div>
          <div class="entry-title">${e.title}</div>
          <div class="entry-body">${e.body}</div>
        </article>
      `;
    }
  </script>
</body>
</html>
