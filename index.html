<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>まはへの日記</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #37352f;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Notion-style top accent bar */
    .accent-bar {
      height: 3px;
      background: linear-gradient(90deg, #e8b4b8, #f0c8c8, #e8b4b8);
    }

    header {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 0;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #37352f;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.875rem;
      color: #9b9a97;
      font-weight: 400;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 4rem;
    }

    .entry {
      padding: 1.5rem 0;
      border-bottom: 1px solid #f0eeeb;
    }

    .entry:last-child {
      border-bottom: none;
    }

    .entry-date {
      font-size: 0.75rem;
      color: #9b9a97;
      margin-bottom: 0.25rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .entry-title {
      font-size: 1.25rem;
      font-weight: 500;
      color: #37352f;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }

    .entry-body {
      font-size: 0.9375rem;
      line-height: 1.8;
      white-space: pre-line;
      color: #37352f;
      font-weight: 300;
    }

    .no-entries {
      text-align: center;
      padding: 4rem 1rem;
      color: #9b9a97;
      font-size: 0.875rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #e0d5cf;
      letter-spacing: 0.3em;
    }

    /* Mobile-first: already looks good. Slight tweaks for larger screens */
    @media (min-width: 640px) {
      header { padding-top: 4rem; }
      header h1 { font-size: 2.5rem; }
      .entry { padding: 2rem 0; }
    }
  </style>
</head>
<body>
  <div class="accent-bar"></div>
  <header>
    <h1>まはへの日記</h1>
    <p>毎日のきもち</p>
  </header>
  <main id="entries"></main>
  <footer>&hearts; &hearts; &hearts;</footer>
  <script src="entries.js"></script>
  <script>
    const main = document.getElementById("entries");

    if (!entries || entries.length === 0) {
      main.innerHTML = '<p class="no-entries">まだ日記がありません</p>';
    } else {
      entries.forEach(e => {
        const d = document.createElement("article");
        d.className = "entry";
        d.innerHTML = `
          <div class="entry-date">${e.date}</div>
          <div class="entry-title">${e.title}</div>
          <div class="entry-body">${e.body}</div>
        `;
        main.appendChild(d);
      });
    }
  </script>
</body>
</html>
